<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GA Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --nt-teal:#00F5AA;--nt-ind:#3B00FF;
  --nt-grad:linear-gradient(135deg,#00F5AA,#3B00FF);
  --nt-grad90:linear-gradient(90deg,#00F5AA,#3B00FF);
  --nt-glow:0 4px 24px rgba(59,0,255,.18),0 2px 8px rgba(0,245,170,.12);
  --bg-page:linear-gradient(160deg,#f5f7fc 0%,#edf0f9 45%,#e6eaf5 100%);
  --bg-nav:linear-gradient(110deg,#0a0f1e 0%,#0d1630 60%,#091228 100%);
  --glass:rgba(255,255,255,.75);--glass-hi:rgba(255,255,255,.92);
  --gbdr:rgba(255,255,255,.95);
  --gshadow:0 2px 16px rgba(59,0,255,.07),0 1px 4px rgba(0,245,170,.05);
  --bdr:rgba(59,0,255,.10);--bdr-mid:rgba(59,0,255,.18);--bdr-teal:rgba(0,245,170,.25);
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --green:#059669;--green-s:#d1fae5;--amber:#d97706;--amber-s:#fef3c7;
  --red:#e11d48;--red-s:#ffe4e6;
  --font:'Noto Sans Thai',sans-serif;--mono:'DM Mono',monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  /* Responsive — CSS visual only */
  --row-h:clamp(40px,3.2vh,52px);
  --nav-h:clamp(48px,3.8vh,58px);
  --tb-h:clamp(42px,3.4vh,52px);
  --fs-name:clamp(12px,0.75vw,14px);
  --fs-meta:clamp(11px,0.68vw,13px);
  --fs-badge:clamp(11px,0.62vw,12px);
  --fs-hdr:clamp(11px,0.62vw,12px);
  --fs-mono:clamp(11px,0.6vw,12px);
  /* 11 columns: # ▼ name start end assign dur % status cat actions */
  --col-grid:24px 18px minmax(180px,1.5fr) 75px 75px 80px 45px 50px 90px 70px 100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg-page);background-attachment:fixed;color:var(--txt);display:flex;flex-direction:column}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px)}
.o1{width:500px;height:500px;background:rgba(0,245,170,.06);top:-180px;left:-120px}
.o2{width:450px;height:450px;background:rgba(59,0,255,.07);bottom:-140px;right:-120px}
.o3{width:320px;height:320px;background:rgba(59,0,255,.04);top:38%;left:42%}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* NAVBAR */
#navbar{height:var(--nav-h);padding:0 18px;display:flex;align-items:center;gap:10px;background:var(--bg-nav);flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.06) inset}
#navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(0,245,170,.5),rgba(59,0,255,.5),transparent)}
.nav-icon{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,rgba(0,245,170,.2),rgba(59,0,255,.25));border:1px solid rgba(0,245,170,.25);display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:14px;height:14px;fill:none;stroke:#00F5AA;stroke-width:2.2}
#proj-name{font-size:13px;font-weight:600;color:#fff;cursor:pointer}
#proj-name:hover{color:rgba(255,255,255,.8)}
.nav-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 2px}
.nav-sub{font-size:9px;color:rgba(255,255,255,.4)}
#nav-legend{display:flex;gap:10px;margin-left:4px}
.nleg{display:flex;align-items:center;gap:3px;font-size:9px;color:rgba(255,255,255,.5)}
.nleg-dot{width:6px;height:6px;border-radius:50%}
.nav-spacer{flex:1}
.nav-btn{font-size:11px;padding:4px 11px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);transition:all .15s;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.75)}
.nav-btn:hover{background:rgba(255,255,255,.16)}
.nav-btn.primary{background:var(--nt-grad);border:none;color:#fff;font-weight:600;box-shadow:var(--nt-glow)}

/* TOOLBAR */
#toolbar{height:var(--tb-h);padding:0 14px;display:flex;align-items:center;gap:4px;flex-shrink:0;overflow:hidden;background:var(--glass-hi);border-bottom:1px solid var(--gbdr);box-shadow:var(--gshadow)}
.tb{font-size:clamp(10px,0.64vw,12px);padding:0 9px;height:calc(var(--tb-h) - 14px);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--txt2);font-family:var(--font);display:flex;align-items:center;gap:3px;white-space:nowrap;transition:all .15s}
.tb:hover{background:rgba(59,0,255,.06);color:#3B00FF;border-color:var(--bdr-mid)}
.tb:disabled{opacity:.4;cursor:not-allowed}
.tb.add{background:var(--nt-grad);color:#fff;border:none;font-weight:600;box-shadow:var(--nt-glow)}
.tb.link{background:#e0fdf4;color:#00a06e;border-color:var(--bdr-teal)}
.tb.save{background:var(--green-s);color:var(--green);border-color:rgba(5,150,105,.25)}
.tb.danger{background:var(--red-s);color:var(--red);border-color:rgba(225,29,72,.2)}
.tb.today{background:rgba(59,0,255,.06);color:#3B00FF;border-color:var(--bdr-mid)}
.tb-sep{width:1px;height:20px;background:var(--bdr);margin:0 2px;flex-shrink:0}
.tb-group{display:flex;align-items:center;border:1px solid var(--bdr-mid);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0}
.tb-tab{border:none!important;border-radius:0!important;background:transparent;color:var(--txt2)}
.tb-tab:hover{background:#f1f5f9!important;color:var(--txt)!important}
.tb-tab.active{background:#e2e8f0!important;color:var(--txt)!important;font-weight:600}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT */
#left{width:780px;min-width:400px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--glass-hi)}
#panel-resizer{flex-shrink:0;width:5px;cursor:col-resize;background:var(--gbdr);position:relative;z-index:10;transition:background .12s}
#panel-resizer::after{content:'';position:absolute;top:0;bottom:0;left:-5px;right:-5px}
#panel-resizer:hover,#panel-resizer.is-dragging{background:var(--bdr-mid)}
#col-hdr{display:grid;grid-template-columns:var(--col-grid);gap:3px;padding:0 12px;height:30px;align-items:center;flex-shrink:0;background:linear-gradient(90deg,#edf0f9,#e6eaf5);border-bottom:1px solid var(--bdr);font-size:var(--fs-hdr);font-weight:600;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono)}
#task-list{flex:1;overflow-y:auto}
#task-list::-webkit-scrollbar{width:4px}
#task-list::-webkit-scrollbar-thumb{background:var(--bdr-mid);border-radius:2px}

.trow{display:grid;grid-template-columns:var(--col-grid);gap:3px;padding:0 12px;height:var(--row-h);align-items:center;border-bottom:1px solid rgba(59,0,255,.05);transition:background .1s;cursor:pointer;overflow:hidden}
.trow:hover{background:linear-gradient(90deg,rgba(0,245,170,.03),rgba(59,0,255,.02))}
.trow.is-parent{background:linear-gradient(90deg,rgba(59,0,255,.05),rgba(0,245,170,.02))}
.trow.is-selected{background:rgba(59,0,255,.07)!important}
.trow.is-cancelled{opacity:.5}
.trow.drag-over{background:rgba(59,0,255,.06)!important;position:relative}
.trow.drag-over::after{content:'';position:absolute;left:8px;right:8px;height:2px;border-radius:2px;background:var(--nt-grad90)}
.trow.drag-over-before::after{top:0}.trow.drag-over-after::after{bottom:0}

.r-num{font-size:var(--fs-mono);color:var(--txt3);text-align:center;font-family:var(--mono);position:relative}
.drag-handle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:11px;color:#3B00FF;opacity:0;transition:opacity .1s;cursor:grab;user-select:none}
.trow:hover .drag-handle{opacity:.8}
.r-exp{font-size:var(--fs-mono);color:var(--txt3);text-align:center;user-select:none;cursor:pointer}
.r-name{display:flex;align-items:center;gap:3px;overflow:hidden;min-width:0}
.r-name .lbl{font-size:var(--fs-name);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.r-name.parent .lbl{font-weight:600}
.r-name.child .lbl{color:var(--txt2)}
.r-name.cancelled .lbl{text-decoration:line-through;color:var(--txt3)}
.r-date{font-size:var(--fs-meta);color:var(--txt2);text-align:center;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-dur{font-size:var(--fs-meta);color:var(--txt2);text-align:center}
.r-pct{font-size:var(--fs-meta);text-align:center;line-height:1.1}
.r-pct.par{display:flex;flex-direction:column;align-items:center;gap:2px}
.pbar{width:34px;height:3px;background:#e2e8f0;border-radius:2px;overflow:hidden;margin:0 auto}
.pbar-fill{height:100%;border-radius:2px;background:var(--nt-grad90)}
.ms-icon{color:var(--amber);font-size:8px;flex-shrink:0}
.dep-count{font-size:var(--fs-mono);padding:0 3px;border-radius:3px;flex-shrink:0;font-family:var(--mono);font-weight:600;background:rgba(59,0,255,.1);color:#3B00FF;border:1px solid var(--bdr-mid)}
/* STATUS BADGES */
.sbadge{font-size:var(--fs-badge);padding:2px 5px;border-radius:4px;font-weight:600;white-space:nowrap;text-align:center;font-family:var(--mono);display:inline-block;max-width:84px;overflow:hidden;text-overflow:ellipsis}
.s-done{background:var(--green-s);color:var(--green);border:1px solid rgba(5,150,105,.2)}
.s-prog{background:rgba(59,0,255,.08);color:#3B00FF;border:1px solid var(--bdr-mid)}
.s-none{background:#f1f5f9;color:var(--txt3);border:1px solid var(--bdr)}
.s-cancel{background:var(--red-s);color:var(--red);border:1px solid rgba(225,29,72,.18)}
/* CATEGORY */
.cat-cell{display:flex;align-items:center;gap:3px;justify-content:center;overflow:hidden}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cat-lbl{font-size:var(--fs-meta);color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ACTIONS — correct size */
.acts{display:flex;gap:3px;justify-content:center;align-items:center}
.act{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr);background:transparent;cursor:pointer;font-size:12px;color:var(--txt3);transition:all .1s;flex-shrink:0}
.act:hover{background:rgba(59,0,255,.08);color:#3B00FF;border-color:var(--bdr-mid)}
.act.del:hover{background:var(--red-s);color:var(--red);border-color:rgba(225,29,72,.2)}
.add-row{padding:6px 12px;font-size:11px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;gap:4px;border-top:1px solid var(--bdr)}
.add-row:hover{color:#3B00FF}
/* COLUMN RESIZER */
.resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;border-radius:0 2px 2px 0}
.resizer:hover,.resizer.is-resizing{background:rgba(59,0,255,.28)}

/* RIGHT — GANTT */
#right{flex:1;overflow:auto;background:var(--bg-page)}
#right::-webkit-scrollbar{width:4px;height:4px}
#right::-webkit-scrollbar-thumb{background:var(--bdr-mid);border-radius:2px}
#gantt-wrap{position:relative;min-width:100%}
#gantt-hdr{position:sticky;top:0;z-index:5;background:linear-gradient(90deg,#edf0f9,#e6eaf5);border-bottom:1px solid var(--bdr);height:28px;display:flex;flex-direction:column;overflow:hidden}
.g-month-row{display:flex;height:13px;flex-shrink:0}
.g-month{font-size:var(--fs-hdr);color:var(--txt2);padding:0 5px;border-right:1px solid var(--bdr);text-align:center;font-weight:600;font-family:var(--mono);line-height:13px}
.g-day-row{display:flex;height:15px;flex-shrink:0}
.g-day{font-size:var(--fs-mono);color:var(--txt3);text-align:center;flex-shrink:0;border-right:1px solid rgba(0,0,0,.04);padding:1px 0;font-family:var(--mono)}
.g-day.weekend{background:rgba(0,0,0,.025)}.g-day.today-d{background:rgba(225,29,72,.08);color:var(--red);font-weight:600}
#gantt-body{position:relative}
.g-row{height:var(--row-h);position:relative;border-bottom:1px solid rgba(59,0,255,.04);overflow:visible}
.g-row:hover{background:rgba(0,245,170,.015)}
.g-wknd{position:absolute;top:0;bottom:0;background:rgba(0,0,0,.02);pointer-events:none}
.today-vline{position:absolute;top:0;bottom:0;width:1.5px;background:linear-gradient(to bottom,transparent,var(--red),transparent);opacity:.65;z-index:4;pointer-events:none}
.today-vlbl{position:absolute;top:1px;font-size:var(--fs-mono);color:var(--red);font-family:var(--mono);font-weight:600;transform:translateX(-50%);white-space:nowrap;z-index:5}
.gbar{position:absolute;border-radius:3px;cursor:pointer;overflow:hidden;display:flex;align-items:center;transition:filter .12s}
.gbar:hover{filter:brightness(.9)}
.gbar-ghost{position:absolute;border-radius:3px;background:rgba(100,116,139,.22);border:1px dashed rgba(100,116,139,.45);pointer-events:none}
.gbar.baseline-late{outline:1.5px solid rgba(225,29,72,.85);outline-offset:1px}
.gbar-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.3)}
.gbar-lbl{position:relative;font-size:var(--fs-mono);color:#fff;padding:0 5px;white-space:nowrap;overflow:hidden;z-index:1;font-weight:500}
.gbar-pct{position:absolute;font-size:var(--fs-mono);color:var(--txt3);white-space:nowrap;font-family:var(--mono)}
.gb-general{background:linear-gradient(90deg,#3B00FF,#5a20ff);box-shadow:0 1px 6px rgba(59,0,255,.25)}
.gb-develop{background:linear-gradient(90deg,#00b87a,#00F5AA);box-shadow:0 1px 6px rgba(0,245,170,.25)}
.gb-test{background:linear-gradient(90deg,#059669,#10b981)}
.gb-meeting{background:linear-gradient(90deg,#c05621,#d97706)}
.gb-parent{background:#1e3a5f!important;border-radius:2px!important;box-shadow:0 1px 4px rgba(30,58,95,.4)!important}
.gb-cancel{background:rgba(0,0,0,.08)!important;border:1px dashed rgba(0,0,0,.14)!important;box-shadow:none!important}
.gb-cancel .gbar-lbl{color:var(--txt3)}
.gms{position:absolute;border-radius:2px;transform:rotate(45deg);cursor:pointer}
.gms:hover{filter:brightness(.85)}
.dep-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:3;overflow:visible}
#right.hide-gtxt .gb-txt{display:none}
/* TOOLBAR SWITCH */
.sw-opt{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2);cursor:pointer;padding:0 8px;height:calc(var(--tb-h) - 14px);border-radius:var(--r-sm);border:1px solid var(--bdr);user-select:none;white-space:nowrap;transition:all .15s}
.sw-opt:hover{background:rgba(59,0,255,.06);color:#3B00FF;border-color:var(--bdr-mid)}
.sw-opt input[type=checkbox]{accent-color:#3B00FF;cursor:pointer;width:12px;height:12px;flex-shrink:0}

/* STATUS BAR */
#status-bar{height:26px;display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;border-top:1px solid var(--gbdr);background:var(--glass-hi)}
.sb-txt{font-size:var(--fs-mono);color:var(--txt3)}
.sb-badge{font-size:var(--fs-mono);padding:1px 7px;border-radius:10px;font-weight:600;font-family:var(--mono)}
.sb-ok{background:var(--green-s);color:var(--green)}
.sb-warn{background:var(--red-s);color:var(--red)}

/* MODALS */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bd.show{display:flex}
#task-modal{width:420px;max-height:90vh;overflow-y:auto;border-radius:var(--r-xl);background:rgba(255,255,255,.9);backdrop-filter:blur(36px) saturate(2);border:1px solid rgba(255,255,255,.98);position:relative;overflow:hidden;box-shadow:0 12px 48px rgba(59,0,255,.15),0 2px 8px rgba(0,245,170,.08)}
#task-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--nt-grad90);z-index:1}
.m-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);background:linear-gradient(90deg,rgba(59,0,255,.05),rgba(0,245,170,.03))}
.m-title{font-size:14px;font-weight:600;color:var(--txt)}
.m-close{width:24px;height:24px;border-radius:6px;border:1px solid var(--bdr);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt3);transition:all .12s}
.m-close:hover{background:var(--red-s);color:var(--red)}
.m-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-body .full{grid-column:1/-1}
.flbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);margin-bottom:3px;display:block;font-family:var(--mono)}
.finput{width:100%;padding:7px 9px;border-radius:var(--r-sm);font-size:12px;font-family:var(--font);background:rgba(255,255,255,.8);border:1px solid var(--bdr-mid);color:var(--txt);transition:all .15s}
.finput:focus{outline:none;border-color:#3B00FF;background:#fff;box-shadow:0 0 0 3px rgba(59,0,255,.1)}
.pct-row{display:flex;align-items:center;gap:8px}
.pct-row input[type=range]{flex:1;accent-color:#3B00FF}
.pct-row span{font-size:11px;color:var(--txt2);min-width:28px;font-family:var(--mono)}
.m-footer{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;background:linear-gradient(90deg,#f5f7fc,#edf0f9)}
.mbtn{font-size:12px;padding:6px 16px;border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);transition:all .15s}
.mbtn.cancel{background:transparent;border:1px solid var(--bdr-mid);color:var(--txt2)}
.mbtn.cancel:hover{background:rgba(59,0,255,.06)}
.mbtn.save{background:var(--nt-grad);color:#fff;border:none;font-weight:600;box-shadow:var(--nt-glow)}
.mbtn.del-m{background:var(--red-s);color:var(--red);border:1px solid rgba(225,29,72,.2);margin-right:auto}
#dep-modal{width:560px;max-height:90vh;overflow-y:auto;border-radius:var(--r-xl);background:rgba(255,255,255,.92);backdrop-filter:blur(36px) saturate(2);border:1px solid rgba(255,255,255,.98);position:relative;overflow:hidden;box-shadow:0 12px 48px rgba(59,0,255,.15)}
#dep-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--nt-grad90);z-index:1}
.dep-grid{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dep-grid .full{grid-column:1/-1}
.dep-hint{font-size:10px;color:var(--txt3);margin-top:3px;line-height:1.45}
.dep-list-wrap{border-top:1px solid var(--bdr)}
.dep-list{max-height:220px;overflow:auto;padding:10px 18px 14px}
.dep-item{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:6px;background:rgba(255,255,255,.86);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:7px 9px;margin-bottom:7px}
.dep-task{font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-type{font-size:10px;font-family:var(--mono);font-weight:600;border-radius:12px;padding:2px 7px}
.dep-type.fs{background:rgba(59,0,255,.08);color:#3B00FF}
.dep-type.ss{background:rgba(0,184,122,.12);color:#008a5e}
.dep-type.ff{background:rgba(217,119,6,.15);color:#b45309}
.dep-type.sf{background:rgba(225,29,72,.12);color:#be123c}
.dep-del{width:24px;height:24px;border:1px solid rgba(225,29,72,.2);border-radius:6px;background:var(--red-s);color:var(--red);font-size:12px;cursor:pointer}
.dep-empty{font-size:11px;color:var(--txt3);padding:14px 0;text-align:center}

}

</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div id="loading"><div class="loader"></div><p>Loading GA Schedule...</p></div>
<div id="toast"></div>
<div id="app">
  <div id="navbar">
    <div class="nav-icon"><svg viewBox="0 0 14 12"><rect x="0" y="0" width="14" height="2.2" rx="1"/><rect x="0" y="5" width="10" height="2.2" rx="1"/><rect x="0" y="10" width="12" height="2.2" rx="1"/></svg></div>
    <div><div id="proj-name" onclick="openProjModal()">— Select Project —</div><div class="nav-sub">GA Schedule · Ajinomoto Thailand</div></div>
    <div class="nav-sep"></div><div id="nav-legend"></div><div class="nav-spacer"></div>

  </div>
  <div id="toolbar">
        <button class="tb link" id="btn-link" onclick="openDepModal()" disabled>→ Add Link</button>

<!-- TASK MODAL -->

<!-- DEP MODAL -->

<script>
const SUPABASE_URL='https://ucentmuxtabrgqgpywts.supabase.co'
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjZW50bXV4dGFicmdxZ3B5d3RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDM4NjQsImV4cCI6MjA5Mjg3OTg2NH0.BGTAPlKksj2ackf6QPHyfQkDuN35S1qoa0zr91kInRQ'
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON)

async function ensureAuth(){const{data:{session}}=await db.auth.getSession();if(!session){const{error}=await db.auth.signInAnonymously();if(error)console.warn('Auth:',error.message)}}

let state={settings:{showTextOnBars:true},projects:[],currentProjectId:null,tasks:[],deps:[],baselines:[],comparedBaseline:null,zoom:1,collapsed:{},editingTaskId:null,holidays:[],colWidths:[28,20,200,58,58,62,36,44,86,68,60]}
let isSS=false,dragTaskId=null
let colResize={active:false,colIdx:-1,startX:0,startW:0}
let lastFocusEl=null,lastSavedAt=null

const CAT_COLORS={General:'#5a20ff',Develop:'#00b87a',Test:'#10b981',Meeting:'#d97706'}
const CAT_BAR={General:'gb-general',Develop:'gb-develop',Test:'gb-test',Meeting:'gb-meeting'}
const STATUS_CLASS={'Not Started':'s-none','In Progress':'s-prog',Completed:'s-done',Cancelled:'s-cancel'}
const STATUS_LABELS={'Not Started':'Not Started','In Progress':'In Progress',Completed:'Completed',Cancelled:'Cancelled'}

const pd=s=>new Date(s+'T00:00:00')
const fmtISO=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
const fmt=d=>{const s=fmtISO(d);return`${s.slice(8,10)}-${s.slice(5,7)}-${s.slice(0,4)}`}
const fmtS=d=>{const s=fmtISO(d);return`${s.slice(8,10)}/${s.slice(5,7)}/${s.slice(0,4)}`}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function addWD(date,n){
  if(n<=1)return new Date(date)
  let d=new Date(date),c=0
  const hols=new Set(state.holidays.map(h=>h.date))
  while(c<n-1){d.setDate(d.getDate()+1);const ds=fmtISO(d);if(d.getDay()!==0&&d.getDay()!==6&&!hols.has(ds))c++}
  return d
}
function taskEnd(t){const d=pd(t.start_date);d.setDate(d.getDate()+(t.duration_days||1)-1);return d}
function getParentDates(taskId){
  const children=state.tasks.filter(c=>c.parent_id===taskId)
  if(!children.length){const t=state.tasks.find(t=>t.id===taskId);return t?{s:pd(t.start_date),e:taskEnd(t)}:null}
  let minS=null,maxE=null
  children.forEach(c=>{const d=getParentDates(c.id);if(!d)return;if(!minS||d.s<minS)minS=d.s;if(!maxE||d.e>maxE)maxE=d.e})
  return{s:minS,e:maxE}
}
function dayPx(){return Math.max(18,Math.round(window.innerWidth*0.013))*state.zoom}
function getROW_H(){return Math.max(40,Math.round(window.innerHeight*0.048))}

function getMinMax(){
  let min=null,max=null
  const all=[...state.tasks,...(state.comparedBaseline?.tasks||[])]
  all.forEach(t=>{if(!t?.start_date)return;const s=pd(t.start_date),e=taskEnd(t);if(!min||s<min)min=s;if(!max||e>max)max=e})
  if(!min){min=new Date();max=new Date();max.setDate(max.getDate()+30)}
  const a=new Date(min);a.setDate(a.getDate()-3)
  const b=new Date(max);b.setDate(b.getDate()+7)
  return{min:a,max:b}
}
function dBetween(a,b){return Math.round((b-a)/86400000)}

function rollupPct(id){
  const ch=state.tasks.filter(t=>t.parent_id===id)
  if(!ch.length)return state.tasks.find(t=>t.id===id)?.progress_pct||0
  return Math.round(ch.reduce((s,c)=>s+rollupPct(c.id),0)/ch.length)
}
function getWBS(){
  const wbs={},ri={};let cnt=0
  function walk(pid,pre){state.tasks.filter(t=>t.parent_id===pid).sort((a,b)=>a.sort_order-b.sort_order).forEach((t,i)=>{const w=pre+(i+1);wbs[t.id]=w;ri[t.id]=++cnt;walk(t.id,w+'.')})}
  walk(null,'');return{wbs,ri}
}
function getVisible(){
  const vis=[]
  function walk(pid,lv){state.tasks.filter(t=>t.parent_id===pid).sort((a,b)=>a.sort_order-b.sort_order).forEach(t=>{vis.push({task:t,level:lv});if(!state.collapsed[t.id])walk(t.id,lv+1)})}
  walk(null,0);return vis
}

async function loadProjects(){const{data,error}=await db.from('projects').select('*').order('created_at');if(error){toast('❌ Failed to load projects');return}state.projects=data||[]}
async function loadTasks(){if(!state.currentProjectId)return;setSS('⟳ Loading...');const{data,error}=await db.from('tasks').select('*').eq('project_id',state.currentProjectId).order('sort_order');if(error){toast('❌ Failed to load tasks');return}state.tasks=data||[];setSS('✓ Synced')}
async function loadHolidays(){const{data}=await db.from('thai_holidays').select('date').eq('year',new Date().getFullYear());state.holidays=data||[]}
async function loadDeps(){if(!state.currentProjectId)return;const{data}=await db.from('dependencies').select('*').eq('project_id',state.currentProjectId);state.deps=data||[]}
async function loadBaselines(){if(!state.currentProjectId)return;const{data}=await db.from('baselines').select('*').eq('project_id',state.currentProjectId).order('created_at',{ascending:false});state.baselines=data||[]}

function render(){
  const RH=getROW_H()
  document.documentElement.style.setProperty('--row-h',RH+'px')
  renderLegend();renderTaskList();renderGantt(RH);renderSB()
}

function renderLegend(){
  const cats=[...new Set(state.tasks.map(t=>t.category))]
  document.getElementById('nav-legend').innerHTML=cats.map(c=>`<div class="nleg"><div class="nleg-dot" style="background:${CAT_COLORS[c]||'#888'}"></div>${c}</div>`).join('')
}

function renderTaskList(){
  renderColHdr()
  const{wbs,ri}=getWBS(),visible=getVisible()
  const tl=document.getElementById('task-list');tl.innerHTML=''
  const frag=document.createDocumentFragment()
  visible.forEach(({task:t,level})=>{
    const hasKids=state.tasks.some(c=>c.parent_id===t.id)
    const{s:rs,e:re}=hasKids?(getParentDates(t.id)||{s:pd(t.start_date),e:taskEnd(t)}):{s:pd(t.start_date),e:taskEnd(t)}
    const e=re,pct=hasKids?rollupPct(t.id):t.progress_pct
    const sc=STATUS_CLASS[t.status]||'s-none'
    const tdeps=state.deps.filter(d=>d.from_task_id===t.id||d.to_task_id===t.id)
    const isCan=t.status==='Cancelled'
    const row=document.createElement('div')
    row.className=`trow${hasKids?' is-parent':''}${state.editingTaskId===t.id?' is-selected':''}${isCan?' is-cancelled':''}`
    row.dataset.id=t.id;row.dataset.parentId=t.parent_id||'';row.draggable=true;row.tabIndex=0;row.setAttribute('role','button');row.setAttribute('aria-label',`Edit task ${esc(t.name)}`)
    row.innerHTML=`
      <span class="r-num">${ri[t.id]||''}<span class="drag-handle">⠿</span></span>
      <span class="r-exp" data-id="${t.id}">${hasKids?(state.collapsed[t.id]?'▶':'▼'):''}</span>
      <span class="r-name ${hasKids?'parent':'child'}${isCan?' cancelled':''}" style="padding-left:${level*12+2}px">
        ${t.type==='milestone'?'<span class="ms-icon">◆</span>':''}
        <span class="lbl" title="${esc(t.name)}">${esc(t.name)}</span>
        ${tdeps.length?`<span class="dep-count">${tdeps.length}</span>`:''}
      </span>
      <span class="r-date">${fmtS(rs)}</span>
      <span class="r-date">${t.type==='milestone'?'—':fmtS(e)}</span>
      <span class="r-date">${esc(t.assignee||'—')}</span>
      <span class="r-dur">${t.type==='milestone'?'—':t.duration_days+'d'}</span>
      <span class="r-pct${hasKids?' par':''}" style="color:${pct===100?'var(--green)':pct>0?'#3B00FF':'var(--txt3)'}">
        <span>${pct}%</span>
        ${hasKids?`<span class="pbar"><span class="pbar-fill" style="width:${pct}%"></span></span>`:''}
      </span>
      <span><span class="sbadge ${sc}">${esc(STATUS_LABELS[t.status]||t.status)}</span></span>
      <span class="cat-cell">
        <div class="cat-dot" style="background:${CAT_COLORS[t.category]||'#888'}"></div>
        <span class="cat-lbl">${esc(t.category||'General')}</span>
      </span>
      <span class="acts">
        <button class="act" data-edit="${t.id}" title="Edit" aria-label="Edit ${esc(t.name)}">✎</button>
        <button class="act del" data-del="${t.id}" title="Delete" aria-label="Delete ${esc(t.name)}">🗑</button>
      </span>`
    frag.appendChild(row)
  })
  tl.appendChild(frag)
  tl.onclick=e=>{
    const exp=e.target.closest('[data-id]');if(exp&&exp.classList.contains('r-exp')){state.collapsed[exp.dataset.id]=!state.collapsed[exp.dataset.id];render();return}
    const eb=e.target.closest('[data-edit]');if(eb){openEditModal(eb.dataset.edit);return}
    const db2=e.target.closest('[data-del]');if(db2){confirmDelete(db2.dataset.del);return}
    const rw=e.target.closest('.trow');if(rw)openEditModal(rw.dataset.id)
  }
  tl.querySelectorAll('.trow').forEach(row=>{
    row.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openEditModal(row.dataset.id)}}
    row.ondragstart=e=>{dragTaskId=row.dataset.id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragTaskId)}
    row.ondragend=()=>{dragTaskId=null;tl.querySelectorAll('.trow.drag-over').forEach(el=>el.classList.remove('drag-over','drag-over-before','drag-over-after'))}
    row.ondragover=e=>{
      if(!dragTaskId||dragTaskId===row.dataset.id)return
      const dr=tl.querySelector(`.trow[data-id="${dragTaskId}"]`);if(!dr)return
      if((dr.dataset.parentId||'')!==(row.dataset.parentId||''))return
      e.preventDefault()
      const rect=row.getBoundingClientRect(),pa=e.clientY>rect.top+rect.height/2
      tl.querySelectorAll('.trow.drag-over').forEach(el=>{if(el!==row)el.classList.remove('drag-over','drag-over-before','drag-over-after')})
      row.classList.add('drag-over');row.classList.toggle('drag-over-before',!pa);row.classList.toggle('drag-over-after',pa)
    }
    row.ondragleave=()=>row.classList.remove('drag-over','drag-over-before','drag-over-after')
    row.ondrop=async e=>{
      e.preventDefault();row.classList.remove('drag-over','drag-over-before','drag-over-after')
      if(!dragTaskId||dragTaskId===row.dataset.id)return
      const dr=tl.querySelector(`.trow[data-id="${dragTaskId}"]`);if(!dr)return
      if((dr.dataset.parentId||'')!==(row.dataset.parentId||'')){toast('⚠️ Can only reorder tasks at the same level');return}
      await reorderTasks(dragTaskId,row.dataset.id,e.clientY>row.getBoundingClientRect().top+row.getBoundingClientRect().height/2)
    }
  })
  applyColumnWidths()
}

async function reorderTasks(dragId,targetId,placeAfter){
  const dt=state.tasks.find(t=>t.id===dragId),tt=state.tasks.find(t=>t.id===targetId)
  if(!dt||!tt||(dt.parent_id||null)!==(tt.parent_id||null))return
  const pid=tt.parent_id||null
  const sibs=state.tasks.filter(t=>(t.parent_id||null)===pid).sort((a,b)=>(a.sort_order??0)-(b.sort_order??0))
  const fi=sibs.findIndex(t=>t.id===dragId),ti=sibs.findIndex(t=>t.id===targetId)
  if(fi<0||ti<0||fi===ti)return
  const[mv]=sibs.splice(fi,1);let ii=ti;if(fi<ti)ii--;if(placeAfter)ii++;sibs.splice(ii,0,mv)
  sibs.forEach((t,i)=>{const r=state.tasks.find(x=>x.id===t.id);if(r)r.sort_order=(i+1)*10})
  setSS('⟳ Updating order...')
  const res=await Promise.all(sibs.map((t,i)=>db.from('tasks').update({sort_order:(i+1)*10}).eq('id',t.id)))
  if(res.find(r=>r.error)){toast('❌ Failed to update order');await loadTasks()}else toast('✅ Order updated')
  setSS('✓ Synced');render()
}

function renderGantt(RH){
  RH=RH||getROW_H()
  const DP=Math.max(18,Math.round(window.innerWidth*0.013))*state.zoom
  const BCH=Math.max(22,Math.round(RH*0.65))
  const BPH=Math.max(8,Math.round(RH*0.22))
  const BMS=Math.max(12,Math.round(RH*0.36))
  const visible=getVisible()
  const{min,max}=getMinMax()
  const bMap=new Map((state.comparedBaseline?.tasks||[]).map(t=>[t.id,t]))
  const totalDays=dBetween(min,max)+1
  const W=totalDays*DP,today=new Date()

  // Header
  const gh=document.getElementById('gantt-hdr');gh.innerHTML='';gh.style.width=W+'px'
  const mr=document.createElement('div');mr.className='g-month-row'
  const dr=document.createElement('div');dr.className='g-day-row'
  let cur=new Date(min),cm='',cpx=0
  for(let i=0;i<totalDays;i++){
    const m=cur.toLocaleString('en',{month:'short'})+' '+cur.getFullYear()
    if(m!==cm){if(cm){const mc=document.createElement('div');mc.className='g-month';mc.style.width=cpx+'px';mc.textContent=cm;mr.appendChild(mc)}cm=m;cpx=0}
    cpx+=DP
    const dc=document.createElement('div');dc.className='g-day'
    const isWE=cur.getDay()===0||cur.getDay()===6,isTd=cur.toDateString()===today.toDateString()
    if(isWE)dc.classList.add('weekend');if(isTd)dc.classList.add('today-d')
    dc.style.width=DP+'px';if(DP>=14)dc.textContent=cur.getDate()
    dr.appendChild(dc);cur.setDate(cur.getDate()+1)
  }
  const mc=document.createElement('div');mc.className='g-month';mc.style.width=cpx+'px';mc.textContent=cm;mr.appendChild(mc)
  gh.appendChild(mr);gh.appendChild(dr)

  // Body
  const gb=document.getElementById('gantt-body');gb.innerHTML='';gb.style.cssText=`width:${W}px;position:relative`
  const rowCont=document.createElement('div');rowCont.style.position='relative'
  const bfrag=document.createDocumentFragment()

  // Weekend bg + today
  const d2=new Date(min)
  for(let i=0;i<totalDays;i++){
    if(d2.getDay()===0||d2.getDay()===6){const bg=document.createElement('div');bg.className='g-wknd';bg.style.cssText=`left:${i*DP}px;width:${DP}px`;bfrag.appendChild(bg)}
    d2.setDate(d2.getDate()+1)
  }
  const tx=dBetween(min,today)*DP
  if(tx>=0&&tx<=W){
    const tv=document.createElement('div');tv.className='today-vline';tv.style.left=tx+'px';bfrag.appendChild(tv)
    const tl=document.createElement('div');tl.className='today-vlbl';tl.style.left=tx+'px';tl.textContent='Today';bfrag.appendChild(tl)
  }

  // Bars
  const barPos={}
  visible.forEach(({task:t},rowIdx)=>{
    const row=document.createElement('div');row.className='g-row';row.style.width=W+'px'
    const hasKids=state.tasks.some(c=>c.parent_id===t.id)
    const{s,e}=hasKids?(getParentDates(t.id)||{s:pd(t.start_date),e:taskEnd(t)}):{s:pd(t.start_date),e:taskEnd(t)}
    const x=dBetween(min,s)*DP,w=Math.max((dBetween(s,e)+1)*DP,DP)
    const pct=hasKids?rollupPct(t.id):t.progress_pct
    const absCy=rowIdx*RH+RH/2
    barPos[t.id]={x1:x,x2:x+w,y:absCy}
    const isCan=t.status==='Cancelled',bt=bMap.get(t.id)
    const isLate=!!(bt&&taskEnd(t)>taskEnd(bt))
    const tn=t.name||'',mid=RH/2

    if(t.type==='milestone'){
      if(bt?.type==='milestone'){const bms=document.createElement('div');bms.className='gms';const bsz=BMS,bbt2=mid-bsz/2,bx=dBetween(min,pd(bt.start_date))*DP;bms.style.cssText=`left:${bx-bsz/2}px;top:${bbt2}px;width:${bsz}px;height:${bsz}px;background:rgba(100,116,139,.38);opacity:.65;pointer-events:none`;row.appendChild(bms)}
      const ms=document.createElement('div');ms.className='gms';const sz=BMS,bbt2=mid-sz/2;ms.style.cssText=`left:${x-sz/2}px;top:${bbt2}px;width:${sz}px;height:${sz}px;background:var(--nt-grad);box-shadow:var(--nt-glow)`;ms.title=tn;ms.onclick=()=>openEditModal(t.id)
      const lbl=document.createElement('div');lbl.className='gb-txt';lbl.style.cssText=`position:absolute;font-size:9px;color:var(--txt2);left:${x+sz+3}px;top:${bbt2}px;white-space:nowrap;font-family:var(--mono)`;lbl.textContent=tn
      row.appendChild(ms);row.appendChild(lbl)
    } else {
      const bh=hasKids?BPH:BCH,bbt2=(RH-bh)/2
      if(bt&&bt.type!=='milestone'){const bs=pd(bt.start_date),be=taskEnd(bt);const bx=dBetween(min,bs)*DP,bw=Math.max((dBetween(bs,be)+1)*DP,DP);const ghost=document.createElement('div');ghost.className='gbar-ghost';ghost.style.cssText=`left:${bx}px;width:${bw}px;height:${bh}px;top:${bbt2}px`;row.appendChild(ghost)}
      const bar=document.createElement('div')
      if(hasKids){bar.className='gbar gb-parent';bar.style.cssText=`position:absolute;left:${x}px;width:${w}px;height:${bh}px;top:${bbt2}px`}
      else{bar.className=`gbar ${isCan?'gb-cancel':(CAT_BAR[t.category]||'gb-general')}`;bar.style.cssText=`left:${x}px;width:${w}px;height:${bh}px;top:${bbt2}px`}
      if(isLate)bar.classList.add('baseline-late')
      if(!isCan&&pct>0&&!hasKids){const fill=document.createElement('div');fill.className='gbar-fill';fill.style.width=pct+'%';bar.appendChild(fill)}
      if(w>40&&DP>=12&&!hasKids){const lbl=document.createElement('div');lbl.className='gbar-lbl gb-txt';lbl.textContent=tn;bar.appendChild(lbl)}
      if(pct>0){const pl=document.createElement('div');pl.className='gbar-pct';pl.style.cssText=`left:${x+w+3}px;top:${bbt2}px`;pl.textContent=pct+'%';row.appendChild(pl)}
      bar.title=`${tn} | ${t.start_date}→${fmt(e)} | ${pct}%`
      bar.onclick=()=>openEditModal(t.id)
      row.appendChild(bar)
    }
    rowCont.appendChild(row)
  })

  // Dep SVG
  const svgH=visible.length*RH+10
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg')
  svg.className='dep-svg';svg.style.cssText=`width:${W}px;height:${svgH}px`;svg.setAttribute('viewBox',`0 0 ${W} ${svgH}`)
  const DC={FS:'#3B00FF',SS:'#00b87a',FF:'#d97706',SF:'#e11d48'}
  state.deps.forEach(dep=>{
    const f=barPos[dep.from_task_id],t2=barPos[dep.to_task_id];if(!f||!t2)return
    const color=DC[dep.dep_type]||'#3B00FF';let x1,y1,x2,y2
    if(dep.dep_type==='FS'){x1=f.x2;y1=f.y;x2=t2.x1;y2=t2.y}
    else if(dep.dep_type==='SS'){x1=f.x1;y1=f.y;x2=t2.x1;y2=t2.y}
    else if(dep.dep_type==='FF'){x1=f.x2;y1=f.y;x2=t2.x2;y2=t2.y}
    else{x1=f.x1;y1=f.y;x2=t2.x2;y2=t2.y}
    const cx=(x1+x2)/2
    const path=document.createElementNS('http://www.w3.org/2000/svg','path')
    path.setAttribute('d',`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`)
    path.setAttribute('fill','none');path.setAttribute('stroke',color);path.setAttribute('stroke-width','1.5');path.setAttribute('stroke-dasharray','4,3');path.setAttribute('opacity','.6')
    const arrow=document.createElementNS('http://www.w3.org/2000/svg','polygon')
    if(dep.dep_type==='FS'||dep.dep_type==='SS')arrow.setAttribute('points',`${x2},${y2} ${x2-6},${y2-3} ${x2-6},${y2+3}`)
    else arrow.setAttribute('points',`${x2},${y2} ${x2+6},${y2-3} ${x2+6},${y2+3}`)
    arrow.setAttribute('fill',color);arrow.setAttribute('opacity','.6')
    const lx=(x1+x2)/2,ly=(y1+y2)/2-5
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');bg.setAttribute('x',lx-7);bg.setAttribute('y',ly-7);bg.setAttribute('width','14');bg.setAttribute('height','10');bg.setAttribute('rx','2');bg.setAttribute('fill','white');bg.setAttribute('opacity','.9')
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');lbl.setAttribute('x',lx);lbl.setAttribute('y',ly);lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','8');lbl.setAttribute('fill',color);lbl.setAttribute('font-family','DM Mono');lbl.setAttribute('font-weight','600');lbl.textContent=dep.dep_type
    svg.appendChild(path);svg.appendChild(arrow);svg.appendChild(bg);svg.appendChild(lbl)
  })
  rowCont.appendChild(svg)
  gb.appendChild(bfrag);gb.appendChild(rowCont)
  document.getElementById('gantt-wrap').style.cssText=`width:${W}px;min-width:${W}px`
}

function renderSB(){
  const total=state.tasks.length,done=state.tasks.filter(t=>t.status==='Completed').length
  const today=new Date()
  const delayed=state.tasks.filter(t=>{const e=taskEnd(t);return e<today&&t.status!=='Completed'&&t.status!=='Cancelled'})
  const avgPct=total?Math.round(state.tasks.filter(t=>t.status!=='Cancelled').reduce((s,t)=>s+t.progress_pct,0)/Math.max(1,state.tasks.filter(t=>t.status!=='Cancelled').length)):0
  document.getElementById('sb-tasks').textContent=`${total} tasks · ${done} done`
  document.getElementById('sb-prog').textContent=`${avgPct}% overall`
  document.getElementById('sb-badge').innerHTML=delayed.length?`<span class="sb-badge sb-warn">${delayed.length} overdue</span>`:(total?`<span class="sb-badge sb-ok">On Track</span>`:'')
  if(state.tasks.length){const dates=state.tasks.map(t=>pd(t.start_date));const minD=new Date(Math.min(...dates));document.getElementById('sb-range').textContent=`${fmtS(minD)} – ${fmtS(taskEnd(state.tasks.reduce((a,b)=>taskEnd(b)>taskEnd(a)?b:a,state.tasks[0])))}`}
}

function compareBaseline(){
  if(!state.currentProjectId){openProjModal();return}if(!state.baselines.length){toast('⚠️ No Baselines saved yet');return}
  const opts=state.baselines.map((b,i)=>`${i+1}. ${b.name}`).join('\n')
  const pick=prompt(`Select Baseline\n0. None\n${opts}`,'1');if(pick===null)return
  const idx=Number(pick);if(idx===0){state.comparedBaseline=null;render();toast('ℹ️ Comparison off');return}
  if(!Number.isInteger(idx)||idx<1||idx>state.baselines.length){toast('⚠️ Invalid selection');return}
  const sel=state.baselines[idx-1]
  try{const tasks=JSON.parse(sel.snapshot_json||'[]');if(!Array.isArray(tasks))throw new Error();state.comparedBaseline={id:sel.id,name:sel.name,tasks};render();toast(`✅ Comparing with ${sel.name}`)}
  catch{toast('❌ Failed to read Baseline data')}
}

function autoFitAll(){
  const colCount=11
  if(!state.colWidths||state.colWidths.length!==colCount)state.colWidths=new Array(colCount).fill(80)
  for(let colIndex=0;colIndex<colCount;colIndex++){
    let maxWidth=0
    document.querySelectorAll(`#col-hdr > *:nth-child(${colIndex+1}), .trow > *:nth-child(${colIndex+1})`).forEach(cell=>{
      const clone=cell.cloneNode(true)
      clone.style.cssText='position:absolute;visibility:hidden;width:auto;max-width:none;white-space:nowrap;overflow:visible;display:inline-block;z-index:-9999'
      clone.querySelectorAll('*').forEach(el=>{el.style.overflow='visible';el.style.maxWidth='none';el.style.width='auto'})
      document.body.appendChild(clone)
      maxWidth=Math.max(maxWidth,clone.getBoundingClientRect().width)
      clone.remove()
    })
    state.colWidths[colIndex]=Math.min(Math.max(maxWidth+16,30),600)
  }
  applyColumnWidths()
  toast('✅ จัดขนาดคอลัมน์อัตโนมัติสำเร็จ')
}

async function clearProject(){
  if(!state.currentProjectId)return;if(!confirm('Clear all tasks in this project?'))return;setSS('⟳ Clearing...')
  await db.from('tasks').delete().eq('project_id',state.currentProjectId);await loadTasks();await loadDeps();setSS('✓ Synced');render();toast('🗑 Project cleared')
}
function exportCSV(){
  const{wbs}=getWBS(),rows=[['WBS','Task Name','Type','Category','Start','End','Duration','%','Status','Assignee']]
  getVisible().forEach(({task:t})=>{rows.push([wbs[t.id]||'',t.name,t.type,t.category,fmt(pd(t.start_date)),fmt(taskEnd(t)),t.duration_days+'d',t.progress_pct+'%',STATUS_LABELS[t.status]||t.status,t.assignee||''])})
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n')
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ga-schedule.csv';a.click();toast('📊 CSV exported')
}
async function exportPNG(){
  if(!window.html2canvas){toast('❌ html2canvas not found');return}if(!state.currentProjectId){openProjModal();return}
  const left=document.getElementById('left'),right=document.getElementById('right')
  const pn=(state.projects.find(p=>p.id===state.currentProjectId)?.name||'project').replace(/[^\wก-๙-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')||'project'
  showL();setSS('⟳ Generating PNG...')
  try{
    const stage=document.createElement('div');stage.style.cssText='position:fixed;left:-99999px;top:0;background:#f5f7fc;display:flex;align-items:flex-start;z-index:-1'
    const lc=left.cloneNode(true),rc=right.cloneNode(true)
    lc.style.cssText=`width:${left.offsetWidth}px;height:auto;overflow:visible`
    rc.style.cssText=`width:${Math.max(right.clientWidth,right.scrollWidth)}px;height:auto;overflow:visible`
    stage.appendChild(lc);stage.appendChild(rc);document.body.appendChild(stage)
    const canvas=await window.html2canvas(stage,{backgroundColor:'#f5f7fc',scale:2,useCORS:true});stage.remove()
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=`ga-schedule-${pn}-${fmt(new Date())}.png`;a.click()
    toast('🖼 PNG exported');setSS('✓ Synced')
  }catch(err){toast('❌ PNG export failed');setSS('⚠️ PNG error');console.error(err)}
  finally{hideL()}
}
async function exportPDF(){
  if(!window.html2canvas||!window.jspdf?.jsPDF){toast('❌ Library not found');return}if(!state.currentProjectId){openProjModal();return}
  const left=document.getElementById('left'),right=document.getElementById('right')
  const pnr=state.projects.find(p=>p.id===state.currentProjectId)?.name||'project'
  const pn=pnr.replace(/[^\wก-๙-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')||'project'
  showL();setSS('⟳ Generating PDF...')
  try{
    const stage=document.createElement('div');stage.style.cssText='position:fixed;left:-99999px;top:0;background:#f5f7fc;display:flex;align-items:flex-start;z-index:-1'
    const lc=left.cloneNode(true),rc=right.cloneNode(true)
    lc.style.cssText=`width:${left.offsetWidth}px;height:auto;overflow:visible`
    rc.style.cssText=`width:${Math.max(right.clientWidth,right.scrollWidth)}px;height:auto;overflow:visible`
    stage.appendChild(lc);stage.appendChild(rc);document.body.appendChild(stage)
    const canvas=await window.html2canvas(stage,{backgroundColor:'#f5f7fc',scale:2,useCORS:true});stage.remove()
    const{jsPDF}=window.jspdf,pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'})
    const pw=pdf.internal.pageSize.getWidth(),m=8,imgW=pw-m*2
    const imgH=Math.min((canvas.height*imgW)/canvas.width,pdf.internal.pageSize.getHeight()-m*2-8)
    pdf.setFont('helvetica','bold');pdf.setFontSize(12);pdf.text(`GA Schedule: ${pnr}`,m,m+4)
    pdf.setFont('helvetica','normal');pdf.setFontSize(9);pdf.text(`Date: ${fmt(new Date())}`,pw-m,m+4,{align:'right'})
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',m,m+8,imgW,imgH)
    pdf.save(`ga-schedule-${pn}-${fmt(new Date())}.pdf`)
    toast('📄 PDF exported');setSS('✓ Synced')
  }catch(err){toast('❌ PDF export failed');setSS('⚠️ PDF error');console.error(err)}
  finally{hideL()}
}

function setSS(t){document.getElementById('sync-status').textContent=t}
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur)}
function showL(){document.getElementById('loading').style.display='flex'}
function hideL(){document.getElementById('loading').style.display='none'}
function markDirty(){setSS('● Unsaved changes')}
function fmtTime(d){return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function rememberFocus(){lastFocusEl=document.activeElement}
function restoreFocus(){if(lastFocusEl&&typeof lastFocusEl.focus==='function')lastFocusEl.focus();lastFocusEl=null}

function applyGanttSettings(){
  const right=document.getElementById('right')
  if(right)right.classList.toggle('hide-gtxt',!state.settings.showTextOnBars)
}
document.getElementById('sw-gtxt').addEventListener('change',function(){
  state.settings.showTextOnBars=this.checked
  applyGanttSettings()
})

function applyColumnWidths(){
  const tpl=state.colWidths.map(w=>w+'px').join(' ')
  const hdr=document.getElementById('col-hdr')
  if(hdr)hdr.style.gridTemplateColumns=tpl
  document.querySelectorAll('.trow').forEach(r=>r.style.gridTemplateColumns=tpl)
}

function renderColHdr(){
  const hdr=document.getElementById('col-hdr')
  if(!hdr)return
  const cols=[
    {lbl:'#',align:'center'},{lbl:'',align:'center'},{lbl:'Task Name',align:'left'},
    {lbl:'Start',align:'center'},{lbl:'End',align:'center'},{lbl:'Assignee',align:'center'},
    {lbl:'Days',align:'center'},{lbl:'%',align:'center'},{lbl:'Status',align:'center'},
    {lbl:'Category',align:'center'},{lbl:'Actions',align:'center'}
  ]
  hdr.innerHTML=cols.map((c,i)=>`<div style="position:relative;text-align:${c.align};${c.align==='left'?'padding-left:4px':''}">${c.lbl}<div class="resizer" data-col="${i}"></div></div>`).join('')
  hdr.querySelectorAll('.resizer').forEach(el=>el.addEventListener('mousedown',onColResizerDown))
}

function onColResizerDown(e){
  e.preventDefault()
  colResize.active=true
  colResize.colIdx=parseInt(e.currentTarget.dataset.col)
  colResize.startX=e.clientX
  colResize.startW=state.colWidths[colResize.colIdx]
  e.currentTarget.classList.add('is-resizing')
  document.body.style.cursor='col-resize'
  document.body.style.userSelect='none'
}

document.addEventListener('mousemove',e=>{
  if(!colResize.active)return
  const delta=e.clientX-colResize.startX
  state.colWidths[colResize.colIdx]=Math.max(20,colResize.startW+delta)
  applyColumnWidths()
})

document.addEventListener('mouseup',()=>{
  if(!colResize.active)return
  colResize.active=false
  document.body.style.cursor=''
  document.body.style.userSelect=''
  document.querySelectorAll('.resizer.is-resizing').forEach(el=>el.classList.remove('is-resizing'))
})

document.getElementById('col-hdr').addEventListener('dblclick',e=>{
  const resizer=e.target.closest('.resizer')
  if(!resizer)return
  const colIdx=parseInt(resizer.dataset.col)
  let maxWidth=0
  document.querySelectorAll(`#col-hdr > *:nth-child(${colIdx+1}), .trow > *:nth-child(${colIdx+1})`).forEach(cell=>{
    const clone=cell.cloneNode(true)
    clone.style.cssText='position:absolute;visibility:hidden;width:auto;max-width:none;white-space:nowrap;overflow:visible;display:inline-block;z-index:-9999'
    clone.querySelectorAll('*').forEach(el=>{el.style.overflow='visible';el.style.maxWidth='none';el.style.width='auto'})
    document.body.appendChild(clone)
    maxWidth=Math.max(maxWidth,clone.getBoundingClientRect().width)
    clone.remove()
  })
  state.colWidths[colIdx]=Math.min(Math.max(maxWidth+12,40),600)
  applyColumnWidths()
})

// Panel splitter
let isResizingPanel=false,startPanelX=0,startLeftWidth=0
const panelResizer=document.getElementById('panel-resizer')
const leftPanel=document.getElementById('left')
panelResizer.addEventListener('mousedown',e=>{
  e.preventDefault()
  isResizingPanel=true
  startPanelX=e.clientX
  startLeftWidth=leftPanel.getBoundingClientRect().width
  panelResizer.classList.add('is-dragging')
  document.body.style.cursor='col-resize'
  document.body.style.userSelect='none'
})
document.addEventListener('mousemove',e=>{
  if(!isResizingPanel)return
  const newW=Math.min(Math.max(startLeftWidth+(e.clientX-startPanelX),320),window.innerWidth*0.8)
  leftPanel.style.width=newW+'px'
})
document.addEventListener('mouseup',()=>{
  if(!isResizingPanel)return
  isResizingPanel=false
  panelResizer.classList.remove('is-dragging')
  document.body.style.cursor=''
  document.body.style.userSelect=''
})

document.getElementById('task-modal-bd').onclick=e=>{if(e.target===e.currentTarget)closeTaskModal()}
document.getElementById('dep-modal-bd').onclick=e=>{if(e.target===e.currentTarget)closeDepModal()}
document.getElementById('proj-modal-bd').onclick=e=>{if(e.target===e.currentTarget)closeProjModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTaskModal();closeDepModal();closeProjModal()}if(e.key==='n'&&(e.metaKey||e.ctrlKey)){e.preventDefault();openAddModal()}})
;['f-name','f-parent','f-type','f-cat','f-start','f-dur','f-status','f-assign','f-pct','f-notes'].forEach(id=>{const el=document.getElementById(id);if(el){el.addEventListener('input',markDirty);el.addEventListener('change',markDirty)}})

let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>render(),200)})

async function init(){
  showL();await ensureAuth();await Promise.all([loadProjects(),loadHolidays()]);hideL();initSS();applyGanttSettings();render()
  if(state.projects.length===1)selectProject(state.projects[0].id)
  else if(state.projects.length>1)openProjModal()
}
init()
</script>
